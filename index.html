<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AquaNova | Profesyonel Su Hijyeni</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4fbfd;
            color: #082c4c;
        }

        header {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, #022b4f, #009db5);
            color: white;
        }

        .container {
            max-width: 850px;
        }

        h1 {
            margin: 0 0 20px;
            font-size: clamp(42px, 8vw, 78px);
            line-height: 1.05;
        }

        p {
            margin: 0 auto 30px;
            max-width: 650px;
            font-size: 20px;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .button {
            display: inline-block;
            padding: 15px 25px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .primary {
            background: white;
            color: #022b4f;
        }

        .secondary {
            border: 2px solid white;
            color: white;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <h1>Profesyonel Su Hijyeni Hizmetleri</h1>

            <p>
                İçme suyu depoları ve su sebilleri için profesyonel
                temizlik, dezenfeksiyon ve periyodik bakım çözümleri.
            </p>

            <div class="buttons">
                <a class="button primary" href="tel:+905073856132">
                    Hemen Ara
                </a>

                <a
                    class="button secondary"
                    href="https://wa.me/905073856132"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    WhatsApp
                </a>
            </div>
        </div>
    </header>
</body>
</html>
